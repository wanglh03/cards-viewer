<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>卡面图鉴</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/face.css" />
  </head>

  <body data-page="home">
    <div id="siteNav"></div>
    <header class="site-header">
      <section class="hero" id="top">
        <div>
          <h1>卡面图鉴</h1>
          <p>全球卡面数据库</p>
        </div>
      </section>
    </header>

    <main class="layout">
      <section class="search-row" aria-label="搜索">
        <label class="search-box" for="searchInput">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="搜索" autocomplete="off" />
        </label>
      </section>

      <section class="filter-row" aria-label="筛选">
        <div class="select-wrap issuer-filter" id="issuerFilterWrap">
          <span>发行方(分类)</span>
          <button class="issuer-filter-trigger" id="issuerFilterTrigger" type="button" aria-haspopup="menu" aria-expanded="false">
            <span id="issuerFilterLabel">全部</span>
          </button>
          <div class="issuer-filter-panel" id="issuerFilterPanel" hidden>
            <div class="issuer-filter-columns">
              <div class="issuer-filter-groups" id="issuerFilterGroups" role="menu" aria-label="发行方(分类)"></div>
              <div class="issuer-filter-banks" id="issuerFilterBanks" role="menu" aria-label="发行方列表"></div>
            </div>
          </div>
        </div>

        <label class="select-wrap" for="organizationFilter">
          <span>卡组织</span>
          <select id="organizationFilter">
            <option value="all">全部卡组织</option>
          </select>
        </label>

        <div class="select-wrap issuer-filter region-filter" id="regionFilterWrap">
          <span>发行方(地区)</span>
          <button class="issuer-filter-trigger" id="regionFilterTrigger" type="button" aria-haspopup="menu" aria-expanded="false">
            <span id="regionFilterLabel">全部</span>
          </button>
          <div class="issuer-filter-panel region-filter-panel" id="regionFilterPanel" hidden>
            <div class="issuer-filter-columns">
              <div class="issuer-filter-groups" id="regionFilterGroups" role="menu" aria-label="发行方(地区)"></div>
              <div class="issuer-filter-banks" id="regionFilterProvinces" role="menu" aria-label="省份或发行方列表"></div>
              <div class="issuer-filter-banks region-filter-bank-column" id="regionFilterBanks" role="menu" aria-label="发行方列表"></div>
            </div>
          </div>
        </div>

        <label class="select-wrap" for="statusFilter">
          <span>状态</span>
          <select id="statusFilter">
            <option value="all">全部状态</option>
            <option value="active">已激活</option>
            <option value="inactive">未激活</option>
            <option value="expired">过期</option>
            <option value="cancelled">注销</option>
          </select>
        </label>
      </section>

      <div class="sort-controls-row">
        <section class="sort-toggle-row" aria-label="排序方式">
          <div class="sort-toggle" id="sortToggle" role="tablist" aria-label="排序方式">
            <button class="sort-toggle-option is-active" id="sortTier" type="button" data-sort-mode="tier" aria-pressed="true">按卡等级排序</button>
            <button class="sort-toggle-option" id="sortOrganization" type="button" data-sort-mode="organization" aria-pressed="false">按卡组织排序</button>
          </div>
        </section>
      </div>

      <section class="face-results" aria-live="polite">
        <div class="face-results-heading">
          <h2>全部卡面</h2>
          <p id="faceCount"></p>
        </div>
        <div id="cardSections" class="face-grid"></div>
      </section>
    </main>

    <div id="siteFooter"></div>
    <script src="js/card-config.js"></script>
    <script src="js/common.js"></script>
    <script src="js/currency.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
