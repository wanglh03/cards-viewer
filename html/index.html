<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>卡片收藏</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/common.css" />
  </head>

  <body data-page="home">
    <div id="siteNav"></div>
    <header class="site-header">
      <section class="hero" id="top">
        <div>
          <h1>卡片收藏</h1>
        </div>
        <div class="stats" id="stats" aria-label="卡片统计"></div>
      </section>
    </header>

    <main class="layout">
      <section class="search-row" aria-label="搜索">
        <label class="search-box" for="searchInput">
          <span aria-hidden="true">⌕</span>
          <input
            id="searchInput"
            type="search"
            placeholder="搜索"
            autocomplete="off"
          />
        </label>
      </section>
      <section class="filter-row" aria-label="筛选">
        <div class="select-wrap issuer-filter" id="issuerFilterWrap">
          <span>发行方(分类)</span>
          <button
            class="issuer-filter-trigger"
            id="issuerFilterTrigger"
            type="button"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            <span id="issuerFilterLabel">全部</span>
          </button>
          <div class="issuer-filter-panel" id="issuerFilterPanel" hidden>
            <div class="issuer-filter-columns">
              <div
                class="issuer-filter-groups"
                id="issuerFilterGroups"
                role="menu"
                aria-label="发行方(分类)"
              ></div>
              <div
                class="issuer-filter-banks"
                id="issuerFilterBanks"
                role="menu"
                aria-label="发行方列表"
              ></div>
            </div>
          </div>
        </div>

        <label class="select-wrap" for="organizationFilter">
          <span>卡组织</span>
          <select id="organizationFilter">
            <option value="all">全部卡组织</option>
          </select>
        </label>

        <div
          class="select-wrap issuer-filter region-filter"
          id="regionFilterWrap"
        >
          <span>发行方(地区)</span>
          <button
            class="issuer-filter-trigger"
            id="regionFilterTrigger"
            type="button"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            <span id="regionFilterLabel">全部</span>
          </button>
          <div
            class="issuer-filter-panel region-filter-panel"
            id="regionFilterPanel"
            hidden
          >
            <div class="issuer-filter-columns">
              <div
                class="issuer-filter-groups"
                id="regionFilterGroups"
                role="menu"
                aria-label="发行方(地区)"
              ></div>
              <div
                class="issuer-filter-banks"
                id="regionFilterProvinces"
                role="menu"
                aria-label="省份或发行方列表"
              ></div>
              <div
                class="issuer-filter-banks region-filter-bank-column"
                id="regionFilterBanks"
                role="menu"
                aria-label="发行方列表"
              ></div>
            </div>
          </div>
        </div>
        <label class="select-wrap" for="statusFilter">
          <span>状态</span>
          <select id="statusFilter">
            <option value="all">全部状态</option>
            <option value="已激活">已激活</option>
            <option value="未激活">未激活</option>
            <option value="过期">过期</option>
            <option value="注销">注销</option>
          </select>
        </label>
      </section>
      <div class="sort-controls-row">
        <section
          class="sort-toggle-row card-view-toggle-row"
          aria-label="卡片类型"
        >
          <div
            class="sort-toggle card-view-toggle"
            id="cardViewToggle"
            role="tablist"
            aria-label="卡片类型"
          >
            <button
              class="sort-toggle-option is-active"
              id="cardViewAll"
              type="button"
              data-card-view="all"
              aria-pressed="true"
            >
              显示所有卡
            </button>
            <button
              class="sort-toggle-option"
              id="cardViewPhysical"
              type="button"
              data-card-view="physical"
              aria-pressed="false"
            >
              只显示实体卡
            </button>
            <button
              class="sort-toggle-option"
              id="cardViewVirtual"
              type="button"
              data-card-view="virtual"
              aria-pressed="false"
            >
              只显示虚拟卡
            </button>
          </div>
        </section>
        <section class="sort-toggle-row" aria-label="排序方式">
          <div
            class="sort-toggle"
            id="sortToggle"
            role="tablist"
            aria-label="排序方式"
          >
            <button
              class="sort-toggle-option is-active"
              id="sortTier"
              type="button"
              data-sort-mode="tier"
              aria-pressed="true"
            >
              按卡等级排序
            </button>
            <button
              class="sort-toggle-option"
              id="sortOrganization"
              type="button"
              data-sort-mode="organization"
              aria-pressed="false"
            >
              按卡组织排序
            </button>
            <button
              class="sort-toggle-option"
              id="sortAcquired"
              type="button"
              data-sort-mode="acquired"
              aria-pressed="false"
            >
              按获得时间排序
            </button>
          </div>
        </section>
      </div>
      <div id="cardSections" class="sections" aria-live="polite"></div>
    </main>

    <template id="cardTemplate">
      <article class="card" tabindex="0" role="button" aria-haspopup="dialog">
        <figure class="card-visual">
          <img alt="" loading="lazy" />
        </figure>
        <div class="card-body">
          <div class="card-title-row">
            <div>
              <h2></h2>
            </div>
            <div class="card-badges">
              <span class="status"></span>
              <span class="virtual-badge" hidden></span>
            </div>
          </div>
          <div class="card-summary" aria-label="卡片摘要">
            <p class="summary-bin" data-field="bin"></p>
            <p class="summary-organization" data-field="organization-tier"></p>
            <p class="summary-issuer" data-field="issuer"></p>
            <p class="summary-region" data-field="region"></p>
            <p class="summary-currency" data-field="currency"></p>
            <p class="summary-acquired" data-field="acquired"></p>
          </div>
          <img class="card-organization-badge" alt="" aria-hidden="true" />
        </div>
      </article>
    </template>

    <div class="card-modal" id="cardModal" hidden>
      <div class="card-modal-backdrop" data-close-modal></div>
      <section
        class="card-modal-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
      >
        <button
          class="card-modal-close"
          type="button"
          data-close-modal
          aria-label="关闭详情"
        >
          ×
        </button>
        <div class="card-modal-hero">
          <div class="card-modal-images">
            <img id="modalImage" alt="" />
            <img id="modalAltImage" alt="" hidden />
          </div>
          <div>
            <h2 id="modalTitle"></h2>
            <p class="card-modal-length" id="modalLength"></p>
            <div class="card-modal-badges">
              <span
                class="card-modal-status badge-pill"
                id="modalStatus"
              ></span>
              <span
                class="virtual-badge badge-pill"
                id="modalVirtual"
                hidden
              ></span>
            </div>
            <a
              class="card-modal-link external-link"
              id="modalApplyLink"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              hidden
            >
              申卡链接
            </a>
          </div>
        </div>
        <dl class="modal-grid" id="modalGrid"></dl>
        <div class="modal-desc">
          <h3>描述</h3>
          <p id="modalDesc"></p>
        </div>
        <div class="modal-desc" id="modalBenefitSection" hidden>
          <h3>权益</h3>
          <p id="modalBenefit"></p>
        </div>
      </section>
    </div>

    <div class="image-lightbox" id="imageLightbox" hidden>
      <button
        class="image-lightbox-backdrop"
        type="button"
        data-close-lightbox
        aria-label="关闭大图"
      ></button>
      <button
        class="image-lightbox-close"
        type="button"
        data-close-lightbox
        aria-label="关闭大图"
      >
        ×
      </button>
      <button
        class="image-lightbox-nav image-lightbox-nav-prev"
        type="button"
        data-lightbox-prev
        aria-label="上一张卡面"
      >
        ‹
      </button>
      <img id="lightboxImage" alt="" />
      <button
        class="image-lightbox-nav image-lightbox-nav-next"
        type="button"
        data-lightbox-next
        aria-label="下一张卡面"
      >
        ›
      </button>
    </div>

    <div id="siteFooter"></div>
    <script src="js/card-config.js"></script>
    <script src="js/common.js"></script>
    <script src="js/currency.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
