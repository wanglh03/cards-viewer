<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>取款手续费</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/withdrawal.css" />
  </head>

  <body class="withdrawal-page" data-page="withdrawal">
    <div id="siteNav"></div>
    <header class="site-header">
      <section class="hero" id="top">
        <div>
          <h1>取款手续费</h1>
        </div>
      </section>
    </header>

    <main class="layout">
      <section class="withdrawal-filter-row" aria-label="筛选">
        <div
          class="select-wrap withdrawal-region-picker"
          id="withdrawalRegionPicker"
        >
          <span>取款地区</span>
          <button
            class="withdrawal-region-trigger"
            id="withdrawalRegionTrigger"
            type="button"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-controls="withdrawalRegionOptions"
          ></button>
          <div
            class="withdrawal-region-options"
            id="withdrawalRegionOptions"
            aria-label="取款地区选项"
            hidden
          >
            <div
              class="withdrawal-continent-options"
              id="withdrawalContinentOptions"
              role="listbox"
              aria-label="大洲选项"
            ></div>
            <div
              class="withdrawal-region-item-options"
              id="withdrawalRegionItemOptions"
              role="listbox"
              aria-label="地区选项"
            ></div>
          </div>
        </div>
        <label
          class="select-wrap withdrawal-currency-picker"
          for="withdrawalCurrency"
        >
          <span>取出货币</span>
          <select id="withdrawalCurrency"></select>
        </label>
        <label
          class="select-wrap withdrawal-amount-picker"
          for="withdrawalAmount"
        >
          <span>取出金额</span>
          <input
            id="withdrawalAmount"
            type="number"
            min="0"
            max="100000000"
            step="any"
            value="1000"
            inputmode="decimal"
          />
        </label>
      </section>

      <div
        class="withdrawal-summary"
        id="withdrawalSummary"
        aria-live="polite"
      ></div>

      <div class="table-wrap withdrawal-table-wrap">
        <table class="withdrawal-table">
          <thead>
            <tr>
              <th>卡面</th>
              <th>卡名</th>
              <th>发行方</th>
              <th>本地取款</th>
              <th>海外取款</th>
            </tr>
          </thead>
          <tbody id="withdrawalTableBody"></tbody>
        </table>
      </div>
      <ul class="withdrawal-note">
        <li>海外銀行可能會徵收附加費。</li>
        <li>本计算器未考虑银行的取款上限及超限手续费。</li>
        <li>部分计算规则可能不准确，仅供参考。</li>
      </ul>
    </main>

    <template id="withdrawalRowTemplate">
      <tr>
        <td class="withdrawal-image-cell"><img alt="" loading="lazy" /></td>
        <td class="withdrawal-name-cell"></td>
        <td class="withdrawal-issuer-cell"></td>
        <td class="withdrawal-fee-cell withdrawal-local-cell"></td>
        <td class="withdrawal-fee-cell withdrawal-overseas-cell"></td>
      </tr>
    </template>

    <div id="siteFooter"></div>
    <script src="js/card-config.js"></script>
    <script src="js/common.js"></script>
    <script src="js/withdrawal.js"></script>
  </body>
</html>
